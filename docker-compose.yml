# Postgres + pgvector for the optional pgvector storage adapter.
#
#   docker compose up -d
#   export PGVECTOR_URL=postgresql://postgres:postgres@localhost:5433/grounded
#   npm run ingest -- corpus     # builds the index in Postgres instead of on disk
#   npm run dev
#
# The app uses the file store by default; setting PGVECTOR_URL switches it to
# this database. Port 5433 avoids clashing with a local Postgres on 5432.
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grounded
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grounded"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
