name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Tests are fully offline: unit tests use a deterministic fake embedder,
      # so no model is downloaded. The pgvector contract test self-skips unless
      # PGVECTOR_URL is set.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build
